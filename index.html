<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For Ari ❤️</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- INTRO SCREEN -->
<div id="introScreen">

    <h1 id="introTitle">
        FROM ASH ❤️
    </h1>

    <button id="continueButton">
        Continue →
    </button>

</div>
    <!-- Canvas -->
    <canvas id="starfield"></canvas>

    <!-- Overlay used for fade transition -->
    <div id="fadeOverlay"></div>

    <!-- Final Anniversary Image -->
    <div id="imageContainer">

    <div id="photoStack">

        <img class="photo" src="images/5.webp" alt="Photo 5">

        <img class="photo" src="images/4.webp" alt="Photo 4">

        <img class="photo" src="images/3.webp" alt="Photo 3">

        <img class="photo" src="images/2.webp" alt="Photo 2">

        <img class="photo" src="images/1.webp" alt="Photo 1">

    </div>

</div>

    <!-- Surprise Button -->
    <button id="surpriseButton">

        One Last Surprise... 💌

    </button>

    <audio id="bgMusic" loop>
    <source src="music/song.mp3" type="audio/mpeg">
</audio>

<audio id="finalMusic" loop>
    <source src="music/final.mp3" type="audio/mpeg">
</audio>
    <script src="script.js"></script>

</body>

</html>
